name: Deploy child theme to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: FTP deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /
          dangerous-clean-slate: false
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.gitignore
            **/.gitattributes
            **/README.md
            **/LICENSE
            **/*.zip
            **/*.md
            **/lanny-bootstrap.py
