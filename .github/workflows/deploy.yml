name: Deploy child theme to HostGator

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sftp-deploy:
    name: SFTP deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H sh00216.hostgator.com.br >> ~/.ssh/known_hosts

      - name: Deploy via SFTP
        run: |
          REMOTE="lanny.nickgranados.com/wp-content/themes/lanny-astra-child"
          # Build batch file: upload every PHP and CSS file in the repo root
          find . -maxdepth 1 -name "*.php" -o -name "*.css" | sed 's|^\./||' | \
            awk -v r="$REMOTE" '{print "put " $0 " " r "/" $0}' > /tmp/sftp-batch.txt
          # Also sync any subdirectory PHP/CSS (template parts, etc.)
          find . -mindepth 2 -name "*.php" -o -mindepth 2 -name "*.css" | \
            grep -v '.git\|.github' | sed 's|^\./||' | \
            awk -v r="$REMOTE" '{print "put " $0 " " r "/" $0}' >> /tmp/sftp-batch.txt
          echo "Files to deploy:"
          cat /tmp/sftp-batch.txt
          sftp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -b /tmp/sftp-batch.txt \
            nickda77@sh00216.hostgator.com.br

      - name: Purge LiteSpeed cache
        run: |
          curl -s -X POST \
            -H "Authorization: Basic $(echo -n 'lannyherrera:${{ secrets.WP_APP_PASSWORD }}' | base64 -w 0)" \
            -H "Content-Type: application/json" \
            "https://lanny.nickgranados.com/wp-json/litespeed/v1/purge/all" \
            -w "\nHTTP: %{http_code}" || true
